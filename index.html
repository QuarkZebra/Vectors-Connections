<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vectors Connections</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            text-align: center;
        }

        p.subtitle {
            margin-top: 0;
            color: #555;
            margin-bottom: 5px;
            text-align: center;
        }

        #level-indicator {
            font-weight: bold;
            color: #0077a3;
            margin-bottom: 20px;
        }

        #game-board {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        #solved-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
        }

        .card {
            background-color: #efefe6;
            border: none;
            border-radius: 6px;
            padding: 10px 8px;
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 90px;
            word-wrap: break-word;
            overflow: hidden;
            line-height: 1.4;
        }

        .card.selected {
            background-color: #5a594e;
            color: white;
        }

        /* Make KaTeX text white when card is selected */
        .card.selected .katex {
            color: white;
        }

        .card-inner {
            width: 100%;
            text-align: center;
        }
        .solved-row {
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 60px;
        }

        .solved-theme {
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .solved-words {
            font-size: 0.9rem;
        }

        .color-0 { background-color: #f9df6d; } /* Yellow */
        .color-1 { background-color: #a0c35a; } /* Green */
        .color-2 { background-color: #b0c4ef; } /* Blue */
        .color-3 { background-color: #ba81c5; } /* Purple */

        #controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        button.action-btn {
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            border: 1px solid #000;
            background-color: white;
            cursor: pointer;
            transition: background-color 0.2s;
            display: none;
        }

        button.action-btn.active {
            display: inline-block;
        }

        button.action-btn:hover:not(:disabled) {
            background-color: #f0f0f0;
        }

        button.action-btn:disabled {
            border-color: #ccc;
            color: #ccc;
            cursor: not-allowed;
            background-color: white;
        }

        button#submit {
            background-color: #000;
            color: white;
        }

        button#submit:disabled {
            background-color: #ccc;
            color: white;
            border-color: #ccc;
        }

        button.primary-action {
            background-color: #e8f4f8;
            border-color: #0077a3;
            color: #0077a3;
        }

        button.primary-action:hover:not(:disabled) {
            background-color: #d0ebf4;
        }

        #mistakes {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #circles {
            display: flex;
            gap: 5px;
        }

        .circle {
            display: inline-block;
            width: 15px;
            height: 15px;
            background-color: #5a594e;
            border-radius: 50%;
            transition: opacity 0.3s;
        }

        .circle.lost {
            opacity: 0.2;
        }

        #message {
            height: 24px;
            font-weight: bold;
            background-color: #000;
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s;
            margin-bottom: 10px;
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        @media (max-width: 600px) {
            #grid { grid-template-columns: repeat(2, 1fr); }
            .card { min-height: 70px; font-size: 0.72rem; padding: 6px 4px; }
        }
    </style>
</head>
<body>

    <h1>Vectors Connections</h1>
    <p class="subtitle">Vectors and Vector Products Edition</p>
    <div id="level-indicator">Game 1 of 5</div>

    <div id="message"></div>

    <div id="mistakes">
        Mistakes remaining:
        <div id="circles">
            <span class="circle"></span>
            <span class="circle"></span>
            <span class="circle"></span>
            <span class="circle"></span>
        </div>
    </div>

    <div id="game-board">
        <div id="solved-area"></div>
        <div id="grid"></div>
    </div>

    <div id="controls">
        <button class="action-btn active" id="shuffle" onclick="shuffleGrid()">Shuffle</button>
        <button class="action-btn active" id="deselect" onclick="deselectAll()">Deselect All</button>
        <button class="action-btn active" id="submit" onclick="submitGuess()" disabled>Submit</button>

        <button class="action-btn primary-action" id="try-again" onclick="retryGame()">Try Again</button>
        <button class="action-btn primary-action" id="next-game" onclick="startNextGame()">Next Game</button>
    </div>

    <script>
        const katexOptions = {
            delimiters: [
                { left: '$$', right: '$$', display: true  },
                { left: '$',  right: '$',  display: false }
            ],
            throwOnError: false
        };

        function typeset(element) {
            renderMathInElement(element, katexOptions);
        }

        const allGames = [
            // Game 1: Basics — Vectors, Scalars & Angles
            [
                {
                    theme: 'ALL MEAN 90°',
                    words: ['Right Angle', 'Orthogonal', 'Perpendicular', '90°']
                },
                {
                    theme: 'VECTORS',
                    words: ['Displacement', 'Force', '20 m/s [N 20° E]', '[20, 150°]']
                },
                {
                    theme: 'SCALARS',
                    words: ['Distance', '3 × 5', '40 seconds', '3/7 correct']
                },
                {
                    theme: 'ANGLES',
                    words: [
                        'Bearing 200°',
                        '$\\arcsin\\!\\left(\\tfrac{1}{2}\\right)$',
                        'Diving 20° below the horizontal',
                        '$30^\\circ = \\dfrac{\\pi}{6}$'
                    ]
                }
            ],
            // Game 2: Dot & Cross Products
            [
                {
                    theme: 'DOT PRODUCT',
                    words: [
                        '$\\vec{a} \\cdot \\vec{b}$',
                        '$|\\vec{a}||\\vec{b}|\\cos\\theta$',
                        '$a_1b_1 + a_2b_2 + a_3b_3$',
                        '$W = \\vec{F} \\cdot \\vec{d}$'
                    ]
                },
                {
                    theme: 'CROSS PRODUCT',
                    words: [
                        '$\\vec{a} \\times \\vec{b}$',
                        '$|\\vec{a}||\\vec{b}|\\sin\\theta$',
                        '$\\tau = \\vec{F} \\times \\vec{d}$',
                        'Area of a parallelogram'
                    ]
                },
                {
                    theme: 'ORTHOGONALITY',
                    words: [
                        'Dot product $= 0$',
                        '$\\theta = 90^\\circ$',
                        '$\\operatorname{comp}_{\\vec{a}}\\vec{b} = 0$',
                        '$\\beta = 90^\\circ$ and $\\gamma = 90^\\circ$'
                    ]
                },
                {
                    theme: 'UNIT VECTORS',
                    words: [
                        'The "hat" symbol: $\\hat{v}$',
                        '$\\vec{u} = \\dfrac{1}{|\\vec{v}|}\\vec{v}$',
                        '$\\hat{i},\\ \\hat{j},$ and $\\hat{k}$',
                        'Fundamental, length-one vectors'
                    ]
                }
            ],
            // Game 3: Projections & Linear Combinations
            [
                {
                    theme: 'SCALAR PROJECTION',
                    words: [
                        '$\\operatorname{comp}_{\\vec{a}}\\vec{b}$',
                        '$\\dfrac{\\vec{a} \\cdot \\vec{b}}{|\\vec{a}|}$',
                        '$|\\vec{b}|\\cos\\theta$',
                        'Component of $\\vec{b}$ along $\\vec{a}$'
                    ]
                },
                {
                    theme: 'VECTOR PROJECTION',
                    words: [
                        '$\\operatorname{proj}_{\\vec{a}}\\vec{b}$',
                        '$\\!\\left(\\dfrac{\\vec{a} \\cdot \\vec{b}}{|\\vec{a}|^2}\\right)\\!\\vec{a}$',
                        '$(\\operatorname{comp}_{\\vec{a}}\\vec{b})\\,\\hat{a}$',
                        'Shadow of  $\\vec{b}$  onto  $\\vec{a}$'
                    ]
                },
                {
                    theme: 'LINEAR COMBINATIONS',
                    words: [
                        '$\\vec{v} = m\\vec{a} + n\\vec{b}$',
                        'In terms of  $\\hat{i},\\ \\hat{j},\\ \\hat{k}$',
                        'Is  $\\vec{c}$  coplanar with  $\\vec{a}$  and  $\\vec{b}$?',
                        '$m(9,{-}3,{-}15)+n(2,8,{-}4)=({-}12,17,19)$'
                    ]
                },
                {
                    theme: 'SPANNING SETS',
                    words: [
                        'All linear combinations fill a space',
                        'Any 2 non-collinear vectors in $\\mathbb{R}^2$',
                        '$\\{\\hat{i},\\ \\hat{j},\\ \\hat{k}\\}$ in $\\mathbb{R}^3$',
                        'Any 3 non-collinear vectors span $\\mathbb{R}^3$'
                    ]
                }
            ],
            // Game 4: Operations & Properties
            [
                {
                    theme: 'VECTOR SUBTRACTION',
                    words: [
                        '$\\vec{a} - \\vec{b}$',
                        '$\\vec{a} + (-\\vec{b})$',
                        'Finding $\\vec{QP}$ from points $P$ and $Q$',
                        'Reverse $\\vec{b}$, then add tip-to-tail'
                    ]
                },
                {
                    theme: 'DISTRIBUTIVE PROPERTY',
                    words: [
                        '$k(\\vec{a}+\\vec{b})=k\\vec{a}+k\\vec{b}$',
                        '$\\vec{a}\\cdot(\\vec{b}+\\vec{c})=\\vec{a}\\cdot\\vec{b}+\\vec{a}\\cdot\\vec{c}$',
                        '$\\vec{a}\\times(\\vec{b}+\\vec{c})=\\vec{a}\\times\\vec{b}+\\vec{a}\\times\\vec{c}$',
                        'Scalar $k$ distributes over a bracket'
                    ]
                },
                {
                    theme: 'PERPENDICULARITY',
                    words: [
                        '$\\vec{a} \\cdot \\vec{b} = 0$',
                        '$\\vec{a} \\times \\vec{b}$ is $\\perp$ to both $\\vec{a}$ and $\\vec{b}$',
                        '$\\theta = 90^\\circ$',
                        '$\\operatorname{comp}_{\\vec{a}}\\vec{b} = 0$'
                    ]
                },
                {
                    theme: 'EQUILIBRIUM',
                    words: [
                        '$\\displaystyle\\sum\\vec{F} = \\vec{0}$',
                        'A boat going nowhere in a river',
                        'A closed loop of displacement vectors',
                        '$\\vec{GP}+\\vec{GQ}+\\vec{GR}=\\vec{0}$'
                    ]
                }
            ],
            // Game 5: Advanced Concepts
            [
                {
                    theme: 'n-DIMENSIONS',
                    words: [
                        '$\\vec{x} = (x_1, x_2, \\ldots, x_n)$',
                        '$|\\vec{x}| = \\sqrt{x_1^2 + x_2^2 + \\cdots + x_n^2}$',
                        'Analyze each dimension individually',
                        'A spanning set in any dimension'
                    ]
                },
                {
                    theme: 'ABSTRACT DOT PRODUCT',
                    words: [
                        '$(\\vec{a}+5\\vec{b})\\cdot(2\\vec{a}-3\\vec{b})=0$',
                        '$2|\\vec{a}|^2+7\\,\\vec{a}\\cdot\\vec{b}-15|\\vec{b}|^2$',
                        '$\\vec{a}\\cdot(\\vec{b}\\cdot\\vec{c})$ is undefined',
                        '$\\vec{a}\\cdot\\vec{a}=|\\vec{a}|^2$'
                    ]
                },
                {
                    theme: 'COPLANARITY & SPANNING',
                    words: [
                        '$m\\vec{a}+n\\vec{b}=\\vec{c}$',
                        '3 equations, 2 unknowns ($m$ and $n$)',
                        '$z = \\dfrac{-27}{13}x - \\dfrac{1}{13}y$',
                        'Any 3 non-collinear vectors in $\\mathbb{R}^3$'
                    ]
                },
                {
                    theme: 'INVARIANT PROOFS',
                    words: [
                        '$\\cos^2\\!\\alpha+\\cos^2\\!\\beta+\\cos^2\\!\\gamma=1$',
                        '$\\vec{GP}+\\vec{GQ}+\\vec{GR}=\\vec{0}$',
                        'Centroid divides median in ratio $2:1$',
                        '$|\\vec{a}\\times\\vec{b}|=|\\vec{a}||\\vec{b}|\\sin\\theta$'
                    ]
                }
            ]
        ];

        let currentGameIndex = 0;
        let activeCategories = [];
        let words = [];
        let selectedWords = [];
        let solvedCategories = [];
        let mistakes = 4;
        let isGameOver = false;

        function loadGame(index) {
            document.getElementById('level-indicator').textContent = `Game ${index + 1} of 5`;

            selectedWords = [];
            solvedCategories = [];
            mistakes = 4;
            isGameOver = false;

            document.getElementById('solved-area').innerHTML = '';
            updateMistakesUI();
            toggleControls('playing');

            activeCategories = JSON.parse(JSON.stringify(allGames[index]));

            shuffleArray(activeCategories);
            activeCategories.forEach((cat, i) => {
                cat.colorClass = `color-${i}`;
                cat.id = i;
            });

            words = activeCategories.flatMap(cat => cat.words);
            shuffleArray(words);
            renderGrid();
        }

        function retryGame() {
            loadGame(currentGameIndex);
        }

        function startNextGame() {
            currentGameIndex++;
            if (currentGameIndex >= allGames.length) {
                showMessage("You've completed all games!");
                document.getElementById('level-indicator').textContent = "All Games Complete!";
                document.getElementById('grid').innerHTML = '';
                toggleControls('finished');
                return;
            }
            loadGame(currentGameIndex);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            words.forEach(word => {
                const card = document.createElement('div');
                card.className = 'card';
                if (selectedWords.includes(word)) card.classList.add('selected');
                const inner = document.createElement('span');
                inner.className = 'card-inner';
                inner.textContent = word;
                card.appendChild(inner);
                card.onclick = () => toggleSelect(word);
                grid.appendChild(card);
            });

            updateSubmitButton();
            typeset(grid);
        }

        function toggleSelect(word) {
            if (isGameOver) return;

            if (selectedWords.includes(word)) {
                selectedWords = selectedWords.filter(w => w !== word);
            } else {
                if (selectedWords.length < 4) {
                    selectedWords.push(word);
                }
            }
            renderGrid();
        }

        function deselectAll() {
            if (isGameOver) return;
            selectedWords = [];
            renderGrid();
        }

        function shuffleGrid() {
            if (isGameOver) return;
            shuffleArray(words);
            renderGrid();
        }

        function updateSubmitButton() {
            const submitBtn = document.getElementById('submit');
            submitBtn.disabled = selectedWords.length !== 4;
        }

        function showMessage(text) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.style.opacity = 1;
            setTimeout(() => {
                msgEl.style.opacity = 0;
            }, 2000);
        }

        function toggleControls(state) {
            const btnShuffle  = document.getElementById('shuffle');
            const btnDeselect = document.getElementById('deselect');
            const btnSubmit   = document.getElementById('submit');
            const btnTryAgain = document.getElementById('try-again');
            const btnNext     = document.getElementById('next-game');

            [btnShuffle, btnDeselect, btnSubmit, btnTryAgain, btnNext].forEach(btn => btn.classList.remove('active'));

            if (state === 'playing') {
                btnShuffle.classList.add('active');
                btnDeselect.classList.add('active');
                btnSubmit.classList.add('active');
            } else if (state === 'lost') {
                btnTryAgain.classList.add('active');
                if (currentGameIndex < allGames.length - 1) btnNext.classList.add('active');
            } else if (state === 'won') {
                if (currentGameIndex < allGames.length - 1) btnNext.classList.add('active');
            }
        }

        function submitGuess() {
            if (selectedWords.length !== 4 || isGameOver) return;

            let matchedCategory = null;
            let isOneAway = false;

            for (const cat of activeCategories) {
                if (solvedCategories.includes(cat.id)) continue;

                let matchCount = 0;
                for (const word of selectedWords) {
                    if (cat.words.includes(word)) matchCount++;
                }

                if (matchCount === 4) {
                    matchedCategory = cat;
                    break;
                } else if (matchCount === 3) {
                    isOneAway = true;
                }
            }

            if (matchedCategory) {
                solvedCategories.push(matchedCategory.id);
                words = words.filter(w => !matchedCategory.words.includes(w));
                selectedWords = [];

                renderSolved(matchedCategory);
                renderGrid();

                if (solvedCategories.length === 4) {
                    showMessage("Perfect!");
                    isGameOver = true;
                    toggleControls('won');
                }
            } else {
                mistakes--;
                updateMistakesUI();

                const grid = document.getElementById('grid');
                grid.classList.add('shake');
                setTimeout(() => grid.classList.remove('shake'), 400);

                if (mistakes === 0) {
                    showMessage("Out of mistakes!");
                    isGameOver = true;
                    toggleControls('lost');
                } else if (isOneAway) {
                    showMessage("One away!");
                } else {
                    showMessage("Not quite!");
                }
            }
        }

        function renderSolved(category) {
            const solvedArea = document.getElementById('solved-area');
            const row = document.createElement('div');
            row.className = `solved-row ${category.colorClass}`;

            const themeDiv = document.createElement('div');
            themeDiv.className = 'solved-theme';
            themeDiv.textContent = category.theme;

            const wordsDiv = document.createElement('div');
            wordsDiv.className = 'solved-words';
            wordsDiv.textContent = category.words.join(', ');

            row.appendChild(themeDiv);
            row.appendChild(wordsDiv);
            solvedArea.appendChild(row);
            typeset(wordsDiv);
        }

        function updateMistakesUI() {
            const circles = document.querySelectorAll('.circle');
            circles.forEach((circle, index) => {
                if (index < mistakes) {
                    circle.classList.remove('lost');
                } else {
                    circle.classList.add('lost');
                }
            });
        }

        loadGame(0);
    </script>
</body>
</html>
